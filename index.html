<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#006241" />
  <title>DistritoGoo</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="assets/icons/icon-180.png" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/cards.css" />
  <link rel="stylesheet" href="css/modal.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <header class="hero" id="hero">
      <nav class="topbar">
        <div class="brand"><img src="assets/logo/logo.svg" alt="DistritoGoo"/><div><span>Asistente Operativo Diario</span><strong>DistritoGoo</strong></div></div>
        <button id="installBtn" class="ghost hidden">Instalar</button>
      </nav>
      <section class="hero-grid">
        <div class="hero-copy">
          <p class="eyebrow" id="todayLabel">Hoy</p>
          <h1 id="greeting">Buenos días</h1>
          <p class="subcopy">Prioriza, ejecuta y mejora cada día.</p>
          <div class="stats" id="stats"></div>
        </div>
        <div class="hero-photo"><img src="assets/photos/kike-dm.jpeg" alt="Comunicación directa" loading="lazy" onerror="this.parentElement.classList.add('no-photo')"/></div>
      </section>
    </header>
    <main>
      <section class="section panel priority-panel">
        <div class="section-title"><div><span>Mi día operativo</span><h2>Prioridades de hoy</h2></div><button class="link-btn" data-open="wfm">Regla WFM</button></div>
        <div class="priority-grid" id="todayCards"></div>
      </section>

      <section class="section two-col">
        <div class="panel">
          <div class="section-title"><div><span>Checks diarios</span><h2>Rutina de ejecución</h2></div></div>
          <div id="dailyChecks" class="check-list"></div>
        </div>
        <div class="panel">
          <div class="section-title"><div><span>Hoy / próximos</span><h2>Eventos inteligentes</h2></div></div>
          <div id="events" class="event-list"></div>
        </div>
      </section>

      <section class="section panel">
        <div class="section-title"><div><span>Talento</span><h2>TBW y altas</h2></div></div>
        <div class="talent-grid"><div id="tbw" class="mini-table"></div><div id="altas" class="mini-table"></div></div>
      </section>

      <section class="section panel">
        <div class="section-title"><div><span>Herramientas</span><h2>Apps y links</h2></div></div>
        <div class="searchbar"><input id="searchInput" type="search" placeholder="Buscar app, reporte, actividad o herramienta…"/><button id="clearSearch" class="ghost">Limpiar</button></div>
        <div id="tabs" class="tabs"></div>
        <div id="appsGrid" class="apps-grid"></div>
      </section>
    </main>
  </div>

  <dialog id="modal" class="modal"><div class="modal-card"><button class="modal-close" id="modalClose">×</button><div id="modalContent"></div></div></dialog>
  <script type="module" src="js/app.js"></script>
</body>
</html>
